# Dependabot configuration
# <https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates>

version: 2
updates:
  # GitHub Actions (workflow dependencies)
  - package-ecosystem: "github-actions"
    directories:
      - "**/*"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 5

  # Git submodules (gitmodules)
  - package-ecosystem: "gitsubmodule"
    directories:
      - "**/*"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      gitsubmodule:
        patterns:
          - "*"
      gitsubmodule-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 5

  # Python (pyproject.toml)
  - package-ecosystem: "uv"
    directories:
      - "**/*"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      uv:
        patterns:
          - "*"
      uv-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 5
